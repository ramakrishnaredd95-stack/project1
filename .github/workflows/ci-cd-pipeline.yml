name: FlipkartApp CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '10.0.x'
  ACR_NAME: flipkartacr
  ACR_LOGIN_SERVER: flipkartacr.azurecr.io
  AKS_CLUSTER_NAME: flipkartapp-aks
  RESOURCE_GROUP: flipkartapp-rg
  API_IMAGE: flipkart-api
  WEB_IMAGE: flipkart-web

jobs:
  # ============================================================
  # STAGE 1: BUILD
  # Compile code, restore dependencies, create artifacts
  # ============================================================
  build:
    name: 'Build'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore FlipkartApp.sln

      - name: Build solution
        run: dotnet build FlipkartApp.sln --configuration Release --no-restore

      - name: Publish API
        run: dotnet publish src/FlipkartApp.API/FlipkartApp.API.csproj -c Release -o ./publish/api --no-build

      - name: Publish Web
        run: dotnet publish src/FlipkartApp.Web/FlipkartApp.Web.csproj -c Release -o ./publish/web --no-build

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-publish
          path: ./publish/api

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-publish
          path: ./publish/web

      - name: Login to ACR
        if: github.ref == 'refs/heads/main'
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push API Docker Image
        if: github.ref == 'refs/heads/main'
        run: |
          docker build -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.API_IMAGE }}:${{ github.sha }} \
                       -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.API_IMAGE }}:latest \
                       -f docker/Dockerfile.api .
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.API_IMAGE }}:${{ github.sha }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.API_IMAGE }}:latest

      - name: Build and Push Web Docker Image
        if: github.ref == 'refs/heads/main'
        run: |
          docker build -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.WEB_IMAGE }}:${{ github.sha }} \
                       -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.WEB_IMAGE }}:latest \
                       -f docker/Dockerfile.web .
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.WEB_IMAGE }}:${{ github.sha }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.WEB_IMAGE }}:latest

  # ============================================================
  # STAGE 2: TEST
  # Unit tests, code coverage (minimum 80%), SonarQube analysis
  # ============================================================
  test:
    name: '🧪 Test'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore FlipkartApp.sln

      - name: Run unit tests with coverage
        run: |
          dotnet test FlipkartApp.sln \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --logger "trx;LogFileName=test-results.trx" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: Check code coverage threshold (80%)
        run: |
          # Install reportgenerator
          dotnet tool install -g dotnet-reportgenerator-globaltool
          
          # Generate coverage report
          reportgenerator \
            -reports:"./TestResults/**/coverage.opencover.xml" \
            -targetdir:"./CoverageReport" \
            -reporttypes:"HtmlSummary;TextSummary"
          
          # Display coverage summary
          cat ./CoverageReport/Summary.txt
          
          # Check if coverage meets minimum 80% threshold
          COVERAGE=$(grep -oP 'Line coverage: \K[0-9.]+' ./CoverageReport/Summary.txt || echo "0")
          echo "Code Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "❌ Code coverage ${COVERAGE}% is below minimum threshold of 80%"
            exit 1
          else
            echo "✅ Code coverage ${COVERAGE}% meets minimum threshold of 80%"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./CoverageReport

      - name: SonarQube Analysis
        if: github.ref == 'refs/heads/main'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          dotnet tool install -g dotnet-sonarscanner
          dotnet sonarscanner begin \
            /k:"flipkartapp" \
            /d:sonar.host.url="${SONAR_HOST_URL}" \
            /d:sonar.token="${SONAR_TOKEN}" \
            /d:sonar.cs.opencover.reportsPaths="./TestResults/**/coverage.opencover.xml" \
            /d:sonar.coverage.exclusions="**/Migrations/**,**/Program.cs"
          dotnet build FlipkartApp.sln --configuration Release
          dotnet sonarscanner end /d:sonar.token="${SONAR_TOKEN}"

  # ============================================================
  # STAGE 3: SECURITY
  # Container scanning with Trivy, dependency vulnerability checks
  # ============================================================
  security:
    name: '🔒 Security'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Check for vulnerable dependencies
        run: |
          dotnet restore FlipkartApp.sln
          echo "=== Checking API dependencies ==="
          dotnet list src/FlipkartApp.API/FlipkartApp.API.csproj package --vulnerable --include-transitive
          echo "=== Checking Web dependencies ==="
          dotnet list src/FlipkartApp.Web/FlipkartApp.Web.csproj package --vulnerable --include-transitive
          echo "=== Checking Infrastructure dependencies ==="
          dotnet list src/FlipkartApp.Infrastructure/FlipkartApp.Infrastructure.csproj package --vulnerable --include-transitive

      - name: Build Docker image for scanning
        run: |
          docker build -t flipkart-api:scan -f docker/Dockerfile.api .
          docker build -t flipkart-web:scan -f docker/Dockerfile.web .

      - name: Trivy - Scan API container
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'flipkart-api:scan'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Trivy - Scan Web container
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'flipkart-web:scan'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Trivy - Scan filesystem
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'

  # ============================================================
  # STAGE 4: DEPLOY DEV
  # Phase 1 — Terraform: Provision AKS + Azure SQL + ACR
  # Phase 2 — Deploy app to AKS dev namespace
  # Phase 3 — Smoke tests
  # ============================================================
  deploy-dev:
    name: '🚀 Deploy Dev'
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'
    environment: development
    env:
      TF_WORKING_DIR: terraform
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ----------------------------------------------------------
      # PHASE 1: Terraform — Provision Azure Infrastructure
      # Creates: Resource Group, Azure SQL, ACR, AKS cluster
      # ----------------------------------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.x'

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "🔧 Initializing Terraform with remote backend..."
          terraform init \
            -backend-config="resource_group_name=flipkart-tfstate-rg" \
            -backend-config="storage_account_name=flipkarttfstate134" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=flipkartapp-dev.terraform.tfstate"

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "✅ Validating Terraform configuration..."
          terraform validate

      - name: Terraform Plan
        id: tf-plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "📋 Planning infrastructure changes..."
          terraform plan \
            -var="resource_group_name=flipkartapp-dev-rg" \
            -var="location=East US" \
            -var="sql_server_name=flipkartapp-dev-sql" \
            -var="sql_db_name=FlipkartAppDevDb" \
            -var="sql_admin_login=${{ secrets.SQL_ADMIN_LOGIN }}" \
            -var="sql_admin_password=${{ secrets.SQL_ADMIN_PASSWORD }}" \
            -var="acr_name=flipkartdevacr" \
            -var="aks_cluster_name=flipkartapp-dev-aks" \
            -var="aks_dns_prefix=flipkartdev" \
            -var="aks_node_count=2" \
            -var="aks_vm_size=Standard_B2s" \
            -out=tfplan-dev \
            -detailed-exitcode || echo "TF_EXIT=$?" >> $GITHUB_ENV

      - name: Terraform Apply — Provision AKS & Azure SQL
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "🚀 Applying Terraform plan — provisioning Azure infrastructure..."
          terraform apply -auto-approve tfplan-dev
          
          echo "📤 Capturing Terraform outputs..."
          AKS_NAME=$(terraform output -raw aks_cluster_name)
          SQL_FQDN=$(terraform output -raw sql_server_fqdn)
          ACR_SERVER=$(terraform output -raw acr_login_server)
          
          echo "AKS_CLUSTER_NAME_DEV=${AKS_NAME}" >> $GITHUB_ENV
          echo "SQL_FQDN_DEV=${SQL_FQDN}" >> $GITHUB_ENV
          echo "ACR_LOGIN_SERVER_DEV=${ACR_SERVER}" >> $GITHUB_ENV
          
          echo "✅ Infrastructure provisioned:"
          echo "   AKS : ${AKS_NAME}"
          echo "   SQL : ${SQL_FQDN}"
          echo "   ACR : ${ACR_SERVER}"

      - name: Retrieve AKS Kubeconfig
        run: |
          echo "🔑 Retrieving AKS credentials..."
          az aks get-credentials \
            --resource-group flipkartapp-dev-rg \
            --name flipkartapp-dev-aks \
            --overwrite-existing
          kubectl cluster-info
          echo "✅ AKS context configured"

      # ----------------------------------------------------------
      # PHASE 2: Create K8s Namespace & Deploy Application
      # ----------------------------------------------------------
      - name: Create dev namespace and secrets
        run: |
          kubectl create namespace flipkart-dev --dry-run=client -o yaml | kubectl apply -f -

          # Create DB connection secret using the known dev SQL server name
          SQL_CONN="Server=tcp:flipkartapp-dev-sql.database.windows.net,1433;Initial Catalog=FlipkartAppDevDb;User ID=${{ secrets.SQL_ADMIN_LOGIN }};Password=${{ secrets.SQL_ADMIN_PASSWORD }};Encrypt=True;TrustServerCertificate=False;"
          kubectl create secret generic flipkart-secrets \
            --from-literal=db-connection-string="${SQL_CONN}" \
            -n flipkart-dev \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to Dev AKS
        run: |
          ACR=flipkartdevacr.azurecr.io
          
          # Patch image tags with the built SHA
          sed -i "s|flipkartacr.azurecr.io/flipkart-api:latest|${ACR}/${{ env.API_IMAGE }}:${{ github.sha }}|g" k8s/api-deployment.yaml
          sed -i "s|flipkartacr.azurecr.io/flipkart-web:latest|${ACR}/${{ env.WEB_IMAGE }}:${{ github.sha }}|g" k8s/api-deployment.yaml
          sed -i 's|namespace: flipkart$|namespace: flipkart-dev|g' k8s/api-deployment.yaml k8s/services.yaml
          
          kubectl apply -f k8s/api-deployment.yaml -n flipkart-dev
          kubectl apply -f k8s/services.yaml -n flipkart-dev
          
          # Wait for both deployments to be ready
          kubectl rollout status deployment/flipkart-api -n flipkart-dev --timeout=300s
          kubectl rollout status deployment/flipkart-web -n flipkart-dev --timeout=300s
          echo "✅ Application deployed to dev AKS"

      # ----------------------------------------------------------
      # PHASE 3: Smoke Tests
      # ----------------------------------------------------------
      - name: Smoke Tests
        run: |
          kubectl run smoke-test --image=curlimages/curl --rm -i --restart=Never -n flipkart-dev -- \
            sh -c "
              echo '--- Health Check ---'
              curl -sf http://flipkart-api-svc:5000/api/health || exit 1
              echo ''
              echo '--- Products Endpoint ---'
              curl -sf http://flipkart-api-svc:5000/api/products || exit 1
              echo ''
              echo '--- Mobile Products ---'
              curl -sf http://flipkart-api-svc:5000/api/products/mobile || exit 1
              echo ''
              echo '--- Grocery Products ---'
              curl -sf http://flipkart-api-svc:5000/api/products/grocery || exit 1
              echo ''
              echo '✅ All smoke tests passed!'
            "

      - name: Terraform Destroy on Failure (cleanup)
        if: failure()
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "⚠️ Deploy failed — cleaning up dev infrastructure..."
          terraform destroy \
            -var="resource_group_name=flipkartapp-dev-rg" \
            -var="sql_admin_login=${{ secrets.SQL_ADMIN_LOGIN }}" \
            -var="sql_admin_password=${{ secrets.SQL_ADMIN_PASSWORD }}" \
            -auto-approve || true

  # ============================================================
  # STAGE 5: DEPLOY STAGING
  # Canary deployment (10% → 50% → 100%), integration tests
  # ============================================================
  deploy-staging:
    name: '🔄 Deploy Staging (Canary)'
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      - name: Create staging namespace
        run: kubectl create namespace flipkart-staging --dry-run=client -o yaml | kubectl apply -f -

      - name: 'Canary Phase 1: Deploy 10%'
        run: |
          echo "📊 Deploying canary with 10% traffic..."
          sed -i 's|flipkartacr.azurecr.io/flipkart-api:canary|${{ env.ACR_LOGIN_SERVER }}/${{ env.API_IMAGE }}:${{ github.sha }}|g' k8s/canary-deployment.yaml
          
          # Deploy canary (1 replica) alongside stable (9 replicas) = 10% traffic
          kubectl apply -f k8s/canary-deployment.yaml -n flipkart-staging
          kubectl rollout status deployment/flipkart-api-canary -n flipkart-staging --timeout=300s

      - name: 'Integration Tests Phase 1'
        run: |
          kubectl run integration-test-1 --image=curlimages/curl --rm -i --restart=Never -n flipkart-staging -- \
            sh -c "
              for i in \$(seq 1 20); do
                STATUS=\$(curl -so /dev/null -w '%{http_code}' http://flipkart-api-svc:5000/api/health)
                if [ \"\$STATUS\" != '200' ]; then
                  echo '❌ Health check failed with status: '\$STATUS
                  exit 1
                fi
              done
              echo '✅ Phase 1 (10%) canary tests passed'
            "

      - name: 'Canary Phase 2: Scale to 50%'
        run: |
          echo "📊 Scaling canary to 50% traffic..."
          kubectl scale deployment/flipkart-api-canary --replicas=5 -n flipkart-staging
          kubectl scale deployment/flipkart-api-stable --replicas=5 -n flipkart-staging
          kubectl rollout status deployment/flipkart-api-canary -n flipkart-staging --timeout=300s

      - name: 'Integration Tests Phase 2'
        run: |
          kubectl run integration-test-2 --image=curlimages/curl --rm -i --restart=Never -n flipkart-staging -- \
            sh -c "
              for i in \$(seq 1 50); do
                STATUS=\$(curl -so /dev/null -w '%{http_code}' http://flipkart-api-svc:5000/api/products)
                if [ \"\$STATUS\" != '200' ]; then
                  echo '❌ Products endpoint failed with status: '\$STATUS
                  exit 1
                fi
              done
              echo '✅ Phase 2 (50%) canary tests passed'
            "

      - name: 'Canary Phase 3: Promote to 100%'
        run: |
          echo "📊 Promoting canary to 100% traffic..."
          # Update stable deployment image to new version
          kubectl set image deployment/flipkart-api-stable \
            flipkart-api=${{ env.ACR_LOGIN_SERVER }}/${{ env.API_IMAGE }}:${{ github.sha }} \
            -n flipkart-staging
          kubectl scale deployment/flipkart-api-stable --replicas=10 -n flipkart-staging
          
          # Remove canary deployment
          kubectl scale deployment/flipkart-api-canary --replicas=0 -n flipkart-staging
          kubectl rollout status deployment/flipkart-api-stable -n flipkart-staging --timeout=300s
          echo "✅ Canary promoted to 100%"

  # ============================================================
  # STAGE 6: DEPLOY PRODUCTION
  # Blue-green deployment, manual approval, monitoring
  # ============================================================
  deploy-production:
    name: '🌐 Deploy Production (Blue-Green)'
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: https://flipkartapp.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      - name: Create production namespace
        run: kubectl create namespace flipkart-prod --dry-run=client -o yaml | kubectl apply -f -

      - name: Determine active slot
        id: slot
        run: |
          ACTIVE_SLOT=$(kubectl get svc flipkart-api-svc -n flipkart-prod -o jsonpath='{.spec.selector.slot}' 2>/dev/null || echo "blue")
          if [ "$ACTIVE_SLOT" == "blue" ]; then
            echo "target=green" >> $GITHUB_OUTPUT
            echo "active=blue" >> $GITHUB_OUTPUT
          else
            echo "target=blue" >> $GITHUB_OUTPUT
            echo "active=green" >> $GITHUB_OUTPUT
          fi
          echo "📊 Active: $ACTIVE_SLOT, Target: $([ $ACTIVE_SLOT == blue ] && echo green || echo blue)"

      - name: Deploy to inactive slot (${{ steps.slot.outputs.target }})
        run: |
          TARGET=${{ steps.slot.outputs.target }}
          echo "🚀 Deploying to ${TARGET} slot..."
          
          # Update the target deployment image
          sed -i 's|flipkartacr.azurecr.io/flipkart-api:v[0-9.]*|${{ env.ACR_LOGIN_SERVER }}/${{ env.API_IMAGE }}:${{ github.sha }}|g' k8s/blue-green-deployment.yaml
          kubectl apply -f k8s/blue-green-deployment.yaml -n flipkart-prod
          
          # Wait for target deployment
          kubectl rollout status deployment/flipkart-api-${TARGET} -n flipkart-prod --timeout=600s

      - name: Verify inactive slot health
        run: |
          TARGET=${{ steps.slot.outputs.target }}
          kubectl run bg-health-check --image=curlimages/curl --rm -i --restart=Never -n flipkart-prod -- \
            sh -c "
              for i in \$(seq 1 10); do
                curl -sf http://flipkart-api-${TARGET}:5000/api/health || exit 1
              done
              echo '✅ ${TARGET} slot health checks passed'
            "

      - name: Switch traffic to ${{ steps.slot.outputs.target }}
        run: |
          TARGET=${{ steps.slot.outputs.target }}
          echo "🔀 Switching production traffic to ${TARGET}..."
          kubectl patch svc flipkart-api-svc -n flipkart-prod \
            -p "{\"spec\":{\"selector\":{\"slot\":\"${TARGET}\"}}}"
          echo "✅ Production now serving from ${TARGET} slot"

      - name: Post-deployment monitoring
        run: |
          echo "📊 Running post-deployment monitoring checks..."
          sleep 30
          
          kubectl run monitor-check --image=curlimages/curl --rm -i --restart=Never -n flipkart-prod -- \
            sh -c "
              ERRORS=0
              for i in \$(seq 1 30); do
                STATUS=\$(curl -so /dev/null -w '%{http_code}' http://flipkart-api-svc:5000/api/health)
                if [ \"\$STATUS\" != '200' ]; then
                  ERRORS=\$((ERRORS + 1))
                fi
                sleep 2
              done
              if [ \$ERRORS -gt 3 ]; then
                echo '❌ Too many errors ('\$ERRORS'/30), consider rollback'
                exit 1
              fi
              echo '✅ Post-deployment monitoring passed ('\$ERRORS' errors in 30 checks)'
            "

      - name: Rollback instructions (if needed)
        if: failure()
        run: |
          ACTIVE=${{ steps.slot.outputs.active }}
          echo "⚠️ ROLLBACK: Run the following to switch back to ${ACTIVE}:"
          echo "kubectl patch svc flipkart-api-svc -n flipkart-prod -p '{\"spec\":{\"selector\":{\"slot\":\"${ACTIVE}\"}}}'"
